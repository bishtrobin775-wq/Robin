<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAG Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#0f172a;
color:white;
padding:40px;

}

.container{

max-width:1200px;
margin:auto;

}

h1{

font-size:42px;
margin-bottom:10px;

}

.subtitle{

color:#94a3b8;
margin-bottom:40px;

}

.card{

background:#1e293b;
border-radius:18px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.35);

}

.section-title{

font-size:24px;
margin-bottom:20px;

}

.knowledge{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;

}

.file{

background:#334155;
padding:20px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.3s;

}

.file:hover{

transform:translateY(-6px);
background:#3b82f6;

}

.icon{

font-size:45px;
margin-bottom:12px;

}

button{

margin-top:35px;
padding:14px 26px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

#status{

margin-top:20px;
font-size:18px;
color:#22c55e;

}

</style>

</head>

<body>

<div class="container">

<h1>📚 RAG Simulator</h1>

<p class="subtitle">
Step 1 — Knowledge Base
</p>

<div class="card">

<h2 class="section-title">
Knowledge Base
</h2>

<div class="knowledge">

<div class="file">
<div class="icon">📄</div>
WHOOP Guide.pdf
</div>

<div class="file">
<div class="icon">📘</div>
Ironman Training.pdf
</div>

<div class="file">
<div class="icon">📰</div>
Sleep Research.pdf
</div>

<div class="file">
<div class="icon">📙</div>
Nutrition Guide.pdf
</div>

<div class="file">
<div class="icon">📑</div>
Recovery Articles.pdf
</div>

<div class="file">
<div class="icon">📝</div>
Company Wiki.txt
</div>

</div>

<button onclick="prepareData()">
Prepare Knowledge Base
</button>

<div id="status"></div>

</div>

</div>

<script>

function prepareData(){

document.getElementById("status").innerHTML=
"✅ Documents loaded successfully.<br><br>Next Step → Chunking";

}

</script>

</body>
</html>
